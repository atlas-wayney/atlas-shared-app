name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # install the pinned deps, dropping the local editable self-reference
          # (requirements.txt is a full freeze incl. pytest/fastapi/etc.)
          sed '/-e .*atlas-shared-app/d' requirements.txt > ci-requirements.txt
          pip install -r ci-requirements.txt
          pip install -e . --no-deps
          # httpx is a declared dependency but missing from the pinned freeze;
          # required by starlette's TestClient in the tests
          pip install httpx ruff

      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: ruff check .

      - name: Test
        run: pytest --cov=atlas_shared_app --cov-report=term-missing
