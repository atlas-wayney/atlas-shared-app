name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # install the package + its runtime deps from pyproject
          # (requirements.txt carries a local editable path that doesn't exist in CI)
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov aiosqlite greenlet ruff

      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: ruff check .

      - name: Test
        run: pytest --cov=atlas_shared_app --cov-report=term-missing
